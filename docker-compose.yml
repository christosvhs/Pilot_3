services:
  server:
    build: .
    image: pilot3-rag:latest
    container_name: pilot3-server
    environment:
      - CHECKPOINT_DIR=/data/checkpoint
      - CHROMA_DB_PATH=/data/chroma_db
      - HF_HOME=/root/.cache/huggingface
    volumes:
      - .:/app
      - ${CHECKPOINT_DIR}:/data/checkpoint:ro
      - ${CHROMA_DB_PATH}:/data/chroma_db
      - ${HF_CACHE_DIR}:/root/.cache/huggingface
    ports:
      - "8000:8000"
    command: uvicorn server:app --host 0.0.0.0 --port 8000
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  ui:
    image: pilot3-rag:latest
    container_name: pilot3-ui
    depends_on:
      - server
    environment:
      - API_BASE=http://server:8000
    volumes:
      - .:/app
    ports:
      - "19000:19000"
    command: python app.py
